name: Build Astro into docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-main-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Astro site into docs
        run: npm run build

      - name: Add nojekyll file to docs
        run: touch docs/.nojekyll

      - name: Commit built site to main
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Build Astro site into docs
          file_pattern: docs package-lock.json
